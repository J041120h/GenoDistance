# =============================================================================
# MAIN CONFIGURATION
# =============================================================================
output_dir: "/dcs07/hongkai/data/harry/result/test"

# Pipeline selection
run_rna_pipeline: false
run_atac_pipeline: false
run_multiomics_pipeline: true

# General settings
